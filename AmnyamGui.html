<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMNYAM HUB</title>
<style>
  :root{
    --cyan: #2fe0d0;
    --blue: #3d8bff;
    --teal: #34e07a;
    --purple: #9b5cff;
    --pink: #ff4fd8;
    --yellow: #ffd23f;
    --deep: #0c2b30;
    --panel: rgba(8,26,24,0.45);
    --panel-2: rgba(14,38,34,0.4);
    --line: rgba(61,139,255,0.4);
    --text: #eafffb;
    --muted: #9fd6c3;
    --on: #38f2a0;
    --off: #ff5470;
  }

  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none;}

  html, body{ background: transparent; }

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 15% 15%, rgba(52,224,140,.16), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(61,139,255,.22), transparent 45%),
      radial-gradient(circle at 85% 85%, rgba(47,224,208,.16), transparent 50%),
      radial-gradient(circle at 15% 85%, rgba(61,139,255,.18), transparent 45%),
      radial-gradient(circle at 50% 50%, rgba(61,139,255,.08), transparent 60%),
      linear-gradient(160deg, #071522 0%, #041220 55%, #030a12 100%);
    overflow:hidden;
  }

  .particle{
    position:fixed;
    width:2px;height:2px;
    border-radius:50%;
    opacity:.5;
    filter: blur(1px);
    animation: float 8s linear infinite;
    pointer-events:none;
  }
  @keyframes float{
    0%{ transform: translateY(110vh); opacity:0; }
    10%{ opacity:.6; }
    90%{ opacity:.6; }
    100%{ transform: translateY(-10vh); opacity:0; }
  }

  .window{
    width: 100vw;
    height: 100vh;
    max-width: 100vw;
    max-height: 100vh;
    background: rgba(4,20,18,.28);
    backdrop-filter: blur(2px);
    border: none;
    border-radius: 0;
    box-shadow: none;
    overflow:hidden;
    display:flex;
    animation: rise .5s cubic-bezier(.2,.8,.2,1);
    position:relative;
  }
  @keyframes rise{
    from{ opacity:0; transform: translateY(20px) scale(.97); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  .edge{
    position:fixed;
    z-index: 40;
    pointer-events:none;
    background: linear-gradient(90deg,
      var(--blue), var(--cyan), var(--teal), var(--cyan), var(--blue),
      var(--cyan), var(--teal), var(--cyan), var(--blue));
    background-size: 400% 100%;
    animation: edgeFlow 6s linear infinite;
    box-shadow: 0 0 12px 1px rgba(52,224,140,.6);
  }
  .edge.top{ top:0; left:0; right:0; height:3px; }
  .edge.bottom{ bottom:0; left:0; right:0; height:3px; animation-direction: reverse; }
  .edge.left{ top:0; bottom:0; left:0; width:3px; background: linear-gradient(180deg,
      var(--blue), var(--cyan), var(--teal), var(--cyan), var(--blue),
      var(--cyan), var(--teal), var(--cyan), var(--blue)); background-size:100% 400%; animation-name: edgeFlowV; }
  .edge.right{ top:0; bottom:0; right:0; width:3px; background: linear-gradient(180deg,
      var(--blue), var(--cyan), var(--teal), var(--cyan), var(--blue),
      var(--cyan), var(--teal), var(--cyan), var(--blue)); background-size:100% 400%; animation-name: edgeFlowV; animation-direction: reverse; }

  @keyframes edgeFlow{
    0%{ background-position: 0% 0%; }
    100%{ background-position: 400% 0%; }
  }
  @keyframes edgeFlowV{
    0%{ background-position: 0% 0%; }
    100%{ background-position: 0% 400%; }
  }
  @keyframes rotate{ to{ transform: rotate(360deg); } }

  .fs-btn{
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 50;
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: rgba(10,30,32,.85);
    border: 1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    color: var(--blue);
    box-shadow: 0 0 14px -4px var(--blue);
    transition:.2s;
  }
  .fs-btn:hover{ background: rgba(61,139,255,.15); transform: scale(1.06); }
  .fs-btn svg{ width:16px; height:16px; stroke: currentColor; fill:none; stroke-width:1.8; }

  /* ---- sidebar ---- */
  .sidebar{
    width: 190px;
    flex-shrink:0;
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 14px 10px;
    display:flex;
    flex-direction:column;
    gap:8px;
    position:relative;
    z-index:2;
  }

  .brand{
    padding: 6px 8px 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .logo{
    width:24px;height:24px;
    border-radius:7px;
    background: conic-gradient(from 180deg, var(--cyan), var(--teal), var(--cyan));
    animation: spin 6s linear infinite;
    flex-shrink:0;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .brand-text .title{ font-weight:800; font-size:14px; letter-spacing:.4px; }
  .brand-text .title span{ color: var(--cyan); }
  .brand-text .ver{ font-size:9.5px; color: var(--muted); }

  .navitem{
    display:flex;
    align-items:center;
    gap:10px;
    padding: 11px 12px;
    border-radius: 11px;
    font-size:13px;
    font-weight:600;
    color: var(--muted);
    background: rgba(255,255,255,.02);
    border: 1px solid transparent;
    cursor:pointer;
    transition:.2s;
  }
  .navitem .ic{ width:18px; height:18px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .navitem .ic svg{ width:17px; height:17px; stroke: currentColor; fill:none; stroke-width:1.8; }
  .navitem:hover{ color:#d6fff8; background: rgba(47,224,208,.06); }
  .navitem.active{
    color:#fff;
    background: linear-gradient(90deg, rgba(61,139,255,.28), rgba(47,224,208,.14));
    border-color: rgba(61,139,255,.55);
    box-shadow: 0 0 16px -4px var(--blue);
  }

  .navitem.premium-item{
    color: var(--yellow);
    background: linear-gradient(90deg, rgba(255,210,63,.1), rgba(255,79,216,.06));
    border-color: rgba(255,210,63,.25);
  }
  .navitem.premium-item:hover{
    background: linear-gradient(90deg, rgba(255,210,63,.18), rgba(255,79,216,.12));
    color:#ffe9a8;
  }

  .sidebar-foot{
    margin-top:auto;
    font-size:10px;
    color: var(--muted);
    display:flex;
    align-items:center;
    gap:6px;
    padding: 6px 8px;
  }
  .dot{
    width:6px;height:6px;
    border-radius:50%;
    background: var(--on);
    box-shadow: 0 0 8px var(--on);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:.4; transform:scale(.7); }
  }

  /* ---- content ---- */
  .content{
    flex:1;
    display:flex;
    flex-direction:column;
    position:relative;
    z-index:2;
  }

  .content-header{
    padding: 16px 20px 10px;
    border-bottom: 1px solid var(--line);
  }
  .content-header .h1{ font-size:16px; font-weight:700; }
  .content-header .h2{ font-size:11px; color: var(--muted); margin-top:2px; }

  .rows{
    flex:1;
    overflow-y:auto;
    padding: 12px 20px 16px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: var(--panel-2);
    border: 1px solid rgba(47,224,208,.2);
    border-radius: 12px;
    padding: 12px 16px;
    transition:.2s;
  }
  .row:hover{
    border-color: rgba(47,224,208,.5);
    transform: translateX(2px);
  }
  .row .name{ font-size:13.5px; font-weight:600; }
  .row .desc{ font-size:10.5px; color: var(--muted); margin-top:2px; }

  .toggle{
    width:46px; height:24px;
    border-radius:20px;
    position:relative;
    cursor:pointer;
    flex-shrink:0;
    transition:.25s;
    background: var(--off);
    box-shadow: 0 0 12px -3px var(--off);
  }
  .toggle::after{
    content:"";
    position:absolute;
    width:18px;height:18px;
    border-radius:50%;
    background:#fff;
    top:3px; left:3px;
    transition:.25s cubic-bezier(.5,0,.2,1.4);
  }
  .toggle.on{
    background: var(--on);
    box-shadow: 0 0 14px -2px var(--on);
  }
  .toggle.on::after{ left:25px; }

  .note{
    background: rgba(255,255,255,.03);
    border: 1px dashed rgba(47,224,208,.3);
    border-radius: 10px;
    padding: 10px 14px;
    font-size:11px;
    color: var(--muted);
  }
  .note b{ color: var(--cyan); display:block; font-size:12px; margin-bottom:3px; }

  .rows::-webkit-scrollbar{ width:5px; }
  .rows::-webkit-scrollbar-thumb{ background: rgba(47,224,208,.35); border-radius:6px; }
</style>
</head>
<body>

<div class="edge top"></div>
<div class="edge bottom"></div>
<div class="edge left"></div>
<div class="edge right"></div>

<div class="fs-btn" id="fsBtn">
  <svg id="fsIconExpand" viewBox="0 0 24 24"><path d="M4 9V4h5M15 4h5v5M20 15v5h-5M9 20H4v-5"/></svg>
  <svg id="fsIconCollapse" viewBox="0 0 24 24" style="display:none"><path d="M9 4v5H4M15 4v5h5M20 20v-5h-5M4 20v-5h5"/></svg>
</div>

<div class="window">

  <div class="sidebar">
    <div class="brand">
      <div class="logo"></div>
      <div class="brand-text">
        <div class="title">AMNYAM <span>HUB</span></div>
        <div class="ver">v1.0 | Universal</div>
      </div>
    </div>

    <div class="navitem">
      <span class="ic"><svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H10v-6h4v6h3.5a1 1 0 0 0 1-1v-9"/></svg></span>
      Main
    </div>
    <div class="navitem active">
      <span class="ic"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></span>
      Visuals
    </div>
    <div class="navitem">
      <span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><path d="M7 21v-5l2-4 3 2 3-2 2 4v5"/><path d="M9 12 7 9M15 12l2-3"/></svg></span>
      Emotes
    </div>
    <div class="navitem">
      <span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.7 3.8 6 3.8 9s-1.3 6.3-3.8 9c-2.5-2.7-3.8-6-3.8-9s1.3-6.3 3.8-9Z"/></svg></span>
      Economy
    </div>
    <div class="navitem premium-item">
      <span class="ic"><svg viewBox="0 0 24 24"><path d="M6 3h12l3 5-9 13L3 8Z"/><path d="M3 8h18M9 3l3 5 3-5M8 8l4 13 4-13"/></svg></span>
      Premium
    </div>
    <div class="navitem">
      <span class="ic"><svg viewBox="0 0 24 24"><path d="M3 17 9 9l4 4 8-10"/><path d="M15 3h6v6"/></svg></span>
      Values
    </div>

    <div class="sidebar-foot"><span class="dot"></span> подключено</div>
  </div>

  <div class="content">
    <div class="content-header">
      <div class="h1">Visuals</div>
      <div class="h2">Настройки отображения</div>
    </div>

    <div class="rows">
      <div class="row">
        <div>
          <div class="name">Cham Everyone</div>
        </div>
        <div class="toggle on"></div>
      </div>

      <div class="row">
        <div>
          <div class="name">Cham Murderer Only</div>
        </div>
        <div class="toggle"></div>
      </div>

      <div class="row">
        <div>
          <div class="name">Cham Sheriff Only</div>
        </div>
        <div class="toggle"></div>
      </div>

      <div class="row">
        <div>
          <div class="name">Cham Coins</div>
        </div>
        <div class="toggle"></div>
      </div>

      <div class="row">
        <div>
          <div class="name">Outline</div>
        </div>
        <div class="toggle on"></div>
      </div>

      <div class="note">
        <b>Outline</b>
        Может не работать на некоторых устройствах или 32-bit экзекьюторах.
      </div>
    </div>
  </div>

</div>

<script>
  const particleColors = ['#2fe0d0', '#3d8bff', '#34e07a', '#9b5cff', '#ff4fd8', '#ffd23f'];
  for(let i=0;i<26;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random()*100 + 'vw';
    p.style.animationDelay = (Math.random()*8) + 's';
    p.style.animationDuration = (6 + Math.random()*5) + 's';
    p.style.background = particleColors[Math.floor(Math.random()*particleColors.length)];
    document.body.appendChild(p);
  }

  document.querySelectorAll('.navitem').forEach(t=>{
    t.addEventListener('click', ()=>{
      document.querySelector('.navitem.active').classList.remove('active');
      t.classList.add('active');
    });
  });

  document.querySelectorAll('.toggle').forEach(s=>{
    s.addEventListener('click', ()=> s.classList.toggle('on'));
  });

  // fullscreen toggle
  const fsBtn = document.getElementById('fsBtn');
  const iconExpand = document.getElementById('fsIconExpand');
  const iconCollapse = document.getElementById('fsIconCollapse');

  function updateFsIcon(){
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    iconExpand.style.display = isFs ? 'none' : 'block';
    iconCollapse.style.display = isFs ? 'block' : 'none';
  }

  fsBtn.addEventListener('click', async ()=>{
    try{
      const el = document.documentElement;
      const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      if(!isFs){
        if(el.requestFullscreen) await el.requestFullscreen();
        else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      } else {
        if(document.exitFullscreen) await document.exitFullscreen();
        else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
      }
    }catch(e){}
  });

  document.addEventListener('fullscreenchange', updateFsIcon);
  document.addEventListener('webkitfullscreenchange', updateFsIcon);
</script>

</body>
</html>
